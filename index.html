<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
<link rel="stylesheet" href="style.css"></head>
<body>
    <div class="calculator">
        <div class="display">
            <input type="text" id="output" value="0" disabled>
        </div>
        <div class="buttons">
            <button class="button operator" id="clear">C</button>
            <button class="button operator" id="backspace">←</button>
            <button class="button operator">%</button>
            <button class="button operator">/</button>
            <button class="button">7</button>
            <button class="button">8</button>
            <button class="button">9</button>
            <button class="button operator">*</button>
            <button class="button">4</button>
            <button class="button">5</button>
            <button class="button">6</button>
            <button class="button operator">-</button>
            <button class="button">1</button>
            <button class="button">2</button>
            <button class="button">3</button>
            <button class="button operator">+</button>
            <button class="button zero">0</button>
            <button class="button">.</button>
            <button class="button operator" id="equals">=</button>
        </div>
        
    </div>

   <script src="script.js"></script>

</body>
</html>
